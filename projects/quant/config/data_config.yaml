data_quality:
  max_missing_data_pct: 5.0
  min_data_days: 756
  outlier_threshold: 3.0
data_sources:
  fallback: csv_local
  primary: yfinance
data_storage:
  cache_enabled: true
  cache_expiry_days: 7
  data_directory: data
download_settings:
  max_retries: 3
  request_timeout: 30
  retry_delay_seconds: 2
logging_level: INFO
